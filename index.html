<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G JUICE</title>
<link rel="icon" type="image/png" href="Untitled design.png">
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0f0a;
            color: #ddd;
            text-align: center;
            line-height: 1.6;
        }
        header {
            background: #111;
            padding: 4rem 1rem 3rem;
        }
        .logo-container {
            max-width: 520px;
            margin: 0 auto;
        }
        .tagline {
            font-size: 1.6rem;
            margin-top: 1rem;
            color: #aaa;
            font-weight: 500;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }
        .hero {
            font-size: 2.3rem;
            margin: 2rem 0 1rem;
            font-weight: 600;
            color: #fff;
        }
        .desc {
            font-size: 1.3rem;
            max-width: 580px;
            margin: 0 auto 3rem;
            color: #bbb;
        }
        button {
            background: #facc15;
            color: #111;
            padding: 1.4rem 4rem;
            font-size: 1.75rem;
            font-weight: 700;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            margin: 1.5rem 0;
        }
        button:hover {
            transform: scale(1.07);
        }
        .recommended {
            margin: 4rem 0;
            background: #111;
            padding: 3rem 1rem;
            border-radius: 20px;
        }
        .rec-grid {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-top: 2rem;
        }
        .rec-card {
            background: #1a1a1a;
            border-radius: 16px;
            width: 260px;
            padding: 1.5rem 1rem;
        }
        .rec-card h3 {
            margin: 1rem 0 0.5rem;
            color: #facc15;
        }
        iframe {
            width: 100%;
            max-width: 820px;
            height: 860px;
            border: 6px solid #facc15;
            border-radius: 24px;
            margin: 2rem auto;
            display: block;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
        }
        footer {
            padding: 3rem 1rem;
            background: #080c08;
            color: #777;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="Untitled design.png" alt="" style="width:100%; height:auto;">
        </div>
        <p class="tagline">all natural hydration</p>
    </header>

    <div class="container">
        <div class="hero">tastes better. feels better.</div>
        <p class="desc">
        </p>

        <button onclick="document.getElementById('form').scrollIntoView({behavior: 'smooth'})">
            order now
        </button>

        <div class="recommended">
            <h2 style="margin-bottom:1rem;">recommended</h2>
            <div class="rec-grid">
                <div class="rec-card">
                    <h3>original</h3>
                    <p>g juice with all of the ingredients except the flavoring</p>
                </div>
                <div class="rec-card">
                    <h3>orange</h3>
                    <p>first flavor ever made, and the best one</p>
                </div>
                <div class="rec-card">
                    <h3>mango tango</h3>
                    <p>very tasty</p>
                </div>
            </div>
        </div>

        <h2 id="form" style="margin:3.5rem 0 1.5rem; font-size:1.9rem; color:#fff;">drop your order</h2>
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSenEaR4NDrqLE2WAWRP1WN1-SSdjXcht8umSJEUQ0XiA33g3A/viewform?usp=sf_link"></iframe>
    </div>

    <footer>
        <p>g juice by gibby</p>
    </footer>
</body>
</html>
